name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:core

      - name: Build services
        run: npm run build:services

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Phase 9 closet viewer-react latency gate
        env:
          NEXT_PUBLIC_CLOSET_VIEWER_PHASE9_ENABLED: "true"
        run: npm run test:e2e:phase9:closet
